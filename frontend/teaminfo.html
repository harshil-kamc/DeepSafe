<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Piece | Research Team</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010409;
            --accent: #00f3ff;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at center, #0d1117 0%, #010409 100%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .team-container {
            text-align: center;
            max-width: 800px;
            width: 90%;
            padding: 40px;
            background: rgba(13, 17, 23, 0.85);
            border: 1px solid var(--border);
            border-radius: 32px;
            backdrop-filter: blur(10px);
            position: relative;
        }

        

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        header h1 {
            font-family: 'Space Grotesk';
            font-size: 2.5rem;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        header h1 span { color: var(--accent); }

        .subtitle {
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.75rem;
            margin-bottom: 40px;
            display: block;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        /* Container for the name and the role box */
.member-card {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border);
    padding: 30px;
    border-radius: 20px;
    display: flex;
    flex-direction: column; /* Forces name on top, role below */
    align-items: center;    /* Centers everything horizontally */
    justify-content: center;
    gap: 15px;              /* Space between name and the role box */
    transition: all 0.4s ease;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 1.4rem;
    letter-spacing: 1px;
}

/* The dedicated box for the work sector */
.work-sector {
    font-size: 0.75rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 2px;
    background: rgba(0, 243, 255, 0.08); /* Faint cyan background */
    border: 1px solid rgba(0, 243, 255, 0.3); /* Subtle neon border */
    padding: 6px 16px;
    border-radius: 6px;
    margin: 0; /* Removes default p-tag margins */
    display: inline-block;
    transition: 0.3s all ease;
}

/* Hover effect for the card and the box */
.member-card:hover {
    border-color: var(--accent);
    background: rgba(0, 243, 255, 0.04);
    transform: translateY(-5px);
    box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
}

.member-card:hover .work-sector {
    background: var(--accent);
    color: #000;
    box-shadow: 0 0 15px var(--accent);
}

        footer {
            margin-top: 50px;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .team-grid { grid-template-columns: 1fr; }
        }
        .hp{
            margin-left: -400px; 
            font-weight: 800; 
            color: var(--accent); 
            letter-spacing: 2px;
            transition: 0.5s; 
             text-decoration: none;
             font-size: 20px;
        }
    </style>
</head>
<body>

<div class="team-container">
    <header>
        <span class="subtitle"><h1>Architects of DeepSafe.</h1></span>
        <h1>Digital Piece Team<span>.</span></h1>
    </header>

    <div class="team-grid">
    <div class="member-card">
        Harshil
        <p class="work-sector">Frontend Developer</p>
    </div>
    
    <div class="member-card">
        Sahithi
        <p class="work-sector">Presenter</p>
    </div>
    
    <div class="member-card">
        Sathwik
        <p class="work-sector">Backend Developer + API Engineer</p>
    </div>
    
    <div class="member-card">
        Rohnith
        <p class="work-sector">Backend Developer + API Engineer</p>
    </div>
    
<br><br><a href="index.html" class="hp">Back to Home Page</a>
</div>
    <footer>
        <p>DeepSafe Risk Detection System v5.0 | Neural Research Division</p>
    </footer>
</div>

</body>
</html>
